name: Diabetes ML CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t diabetes-api .

      - name: Run Container
        run: docker run -d -p 8000:8000 --name diabetes-container diabetes-api

      - name: Wait for API startup
        run: sleep 10

      - name: Verify API is running
        run: curl http://localhost:8000/docs